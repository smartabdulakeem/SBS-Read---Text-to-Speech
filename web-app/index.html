<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoxRead AI - Text to Speech</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Don't register a new service worker. We ship a self-unregistering sw.js
      // so any previously-installed (broken, cache-first) worker updates to it,
      // clears its caches, and unregisters — recovering existing clients.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations()
          .then((regs) => regs.forEach((r) => r.update()))
          .catch(() => {});
      }
    </script>
  </body>
</html>
