<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0b071e 0%, #150e2a 100%);
      --accent-purple: #a855f7;
      --accent-blue: #3b82f6;
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
    }
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      background: var(--bg-gradient);
      color: var(--text-primary);
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      box-sizing: border-box;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: white;
      font-weight: bold;
    }
    .title {
      font-size: 16px;
      font-weight: 800;
      margin: 0;
      background: linear-gradient(135deg, #white, #a855f7);
      background-clip: text;
    }
    .btn {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: var(--text-primary);
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      transition: all 0.2s ease;
    }
    .btn:hover {
      background: rgba(168, 85, 247, 0.15);
      border-color: var(--accent-purple);
      transform: translateY(-1px);
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-blue) 100%);
      border: none;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-blue) 100%);
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
      filter: brightness(1.1);
    }
    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 14px 0;
    }
    textarea {
      width: 100%;
      height: 80px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: var(--text-primary);
      padding: 8px 12px;
      font-size: 12px;
      resize: none;
      box-sizing: border-box;
      outline: none;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    textarea:focus {
      border-color: var(--accent-purple);
    }
    .footer-link {
      display: block;
      text-align: center;
      font-size: 11px;
      color: var(--text-secondary);
      text-decoration: none;
      margin-top: 8px;
      transition: color 0.2s;
    }
    .footer-link:hover {
      color: var(--accent-purple);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">V</div>
    <h2 class="title">VoxRead AI Extension</h2>
  </div>

  <button class="btn btn-primary" id="btn-read-page">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
    Read Current Webpage
  </button>
  
  <button class="btn" id="btn-read-selection">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="9" x2="20" y2="9"></line><line x1="4" y1="15" x2="20" y2="15"></line><line x1="10" y1="3" x2="8" y2="21"></line><line x1="16" y1="3" x2="14" y2="21"></line></svg>
    Read Selected Text
  </button>

  <div class="divider"></div>

  <textarea id="custom-text" placeholder="Or paste custom text here to read aloud..."></textarea>
  <button class="btn btn-primary" id="btn-read-custom" style="margin-bottom: 0;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
    Speak Custom Text
  </button>

  <a href="http://localhost:5173" target="_blank" class="footer-link" id="link-dashboard">
    Open Desktop Dashboard (Web App)
  </a>

  <script src="popup.js"></script>
</body>
</html>
